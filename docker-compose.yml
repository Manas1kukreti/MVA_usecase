version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mva_user
      POSTGRES_PASSWORD: mva_password
      POSTGRES_DB: mva_profiling
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mva_user -d mva_profiling"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://mva_user:mva_password@db:5432/mva_profiling
      TEMP_STORAGE_DIR: /app/tmp/uploads
      LOG_LEVEL: INFO
      LOG_FORMAT: json
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./config:/app/config:ro

volumes:
  pgdata:
